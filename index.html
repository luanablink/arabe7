<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venha Ver o Pôr do Sol</title>
    <style>
        /* CSS Integrado */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #cc0000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #888;
        }

        .qr-frame {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 0 25px rgba(204, 0, 0, 0.4);
        }

        img {
            display: block;
            width: 300px;
            height: 300px;
        }

        .info {
            margin-top: 30px;
            font-style: italic;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Venha Ver o Pôr do Sol</h1>
        <p>Um jogo de terror inspirado na obra de Lygia Fagundes Telles.</p>
        
        <div class="qr-frame">
            <!-- Seu QR Code -->
            <img src="https://i.imgur.com/3mW77gn.jpeg" alt="QR Code do Jogo">
        </div>

        <div class="info">
            <p>Escaneie para iniciar a sua descida ao abismo.</p>
        </div>
    </div>

</body>
</html>
